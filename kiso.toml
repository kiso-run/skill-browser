[kiso]
type = "skill"
name = "browser"
version = "0.1.0"
description = "Headless browser automation via Playwright WebKit"

[kiso.skill]
summary = "Control a headless WebKit browser: navigate pages, inspect elements, click, fill forms, take screenshots"
usage_guide = """\
Use this skill to automate web browsing: navigate to URLs, interact with forms, click buttons, take screenshots.

Actions:
  navigate  — go to a URL (required first step)
  snapshot  — list interactive elements numbered [1], [2], ...
  click     — click element [N] or CSS selector
  fill      — type text into element [N] or CSS selector
  screenshot — save a PNG to the session workspace

Workflow: always start with 'navigate', then 'snapshot' to see the page elements, \
then use element numbers with 'click' or 'fill'.

Example: action='navigate' url='https://example.com', then action='snapshot', \
then action='fill' element='[2]' value='hello', then action='click' element='[3]'.

Browser state (cookies, localStorage, session) persists between calls within the same session."""

[kiso.skill.args]
action = { type = "string", required = true, description = "one of: navigate, snapshot, click, fill, screenshot" }
url = { type = "string", required = false, description = "URL to navigate to (required for 'navigate')" }
element = { type = "string", required = false, description = "element reference like [3] or a CSS selector (required for 'click' and 'fill')" }
value = { type = "string", required = false, description = "text to type into the element (required for 'fill')" }

[kiso.deps]
python = ">=3.11"
bin = ["playwright"]
